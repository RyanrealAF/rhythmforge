name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

      - name: Mirror files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_ID" ]; then
            echo "Missing required secrets: HF_TOKEN and/or HF_SPACE_ID"
            exit 1
          fi

          HF_URL="https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          rm -rf /tmp/hf-space
          git clone "$HF_URL" /tmp/hf-space

          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ /tmp/hf-space/

          cd /tmp/hf-space
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git commit -m "Sync from GitHub (${GITHUB_SHA})"
          git push origin main
