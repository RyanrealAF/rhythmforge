name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs

      - name: Configure git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

      - name: Mirror files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          set -euo pipefail

          echo "GitHub ref: ${GITHUB_REF}"
          echo "GitHub SHA: ${GITHUB_SHA}"

          if [ -z "${HF_TOKEN:-}" ] || [ -z "${HF_SPACE_ID:-}" ]; then
            echo "Missing required secrets: HF_TOKEN and/or HF_SPACE_ID"
            exit 1
          fi

          # Accept either "owner/space" or full HTTPS URL in HF_SPACE_ID.
          SPACE_PATH="${HF_SPACE_ID#https://huggingface.co/spaces/}"
          SPACE_PATH="${SPACE_PATH#http://huggingface.co/spaces/}"
          SPACE_PATH="${SPACE_PATH%/}"

          if [[ "${SPACE_PATH}" != */* ]]; then
            echo "HF_SPACE_ID must be in 'owner/space' form (or full Space URL). Got: ${HF_SPACE_ID}"
            exit 1
          fi

          rm -rf /tmp/hf-space

          # Try common Hugging Face HTTPS auth usernames to support different token setups.
          CLONE_OK=0
          for HF_USER in oauth2 __token__ user; do
            HF_URL="https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${SPACE_PATH}"
            echo "Trying HF clone auth mode: ${HF_USER}"
            if git clone "$HF_URL" /tmp/hf-space; then
              CLONE_OK=1
              break
            fi
          done

          if [ "${CLONE_OK}" -ne 1 ]; then
            echo "Failed to authenticate clone to Hugging Face Space. Check HF_TOKEN scope and HF_SPACE_ID."
            exit 1
          fi

          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ /tmp/hf-space/

          cd /tmp/hf-space
          git lfs install --local
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git commit -m "Sync from GitHub (${GITHUB_SHA})"
          git push origin HEAD:main
